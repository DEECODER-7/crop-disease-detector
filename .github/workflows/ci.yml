name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          pip install -r requirements-api.txt
          pip install pytest httpx

      - name: Generate dummy checkpoint for testing
        run: python -m scripts.create_dummy_checkpoint

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t crop-disease-api:ci-test .